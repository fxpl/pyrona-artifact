name: Bundle PyPerformance Wheelhouses

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: Base branch for the PR
        required: false
        default: main
      pr_branch:
        description: Branch name used for the generated PR
        required: false
        default: automation/bundle-pyperformance

permissions:
  contents: write
  pull-requests: write

jobs:
  build-linux-wheelhouse:
    name: Build ${{ matrix.wheelhouse_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            wheelhouse_name: wheelhouse-linux-x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            wheelhouse_name: wheelhouse-linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build bundled pyperformance wheelhouse
        run: |
          set -euo pipefail
          WHEELHOUSE_DIR="benchmarks/pyperformance/${{ matrix.wheelhouse_name }}" \
            bash benchmarks/pyperformance/build_wheelhouse.sh
          test -d "benchmarks/pyperformance/${{ matrix.wheelhouse_name }}"

      - name: Upload bundled wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyperformance-${{ matrix.wheelhouse_name }}
          path: benchmarks/pyperformance/${{ matrix.wheelhouse_name }}
          if-no-files-found: error

  create-pr:
    name: Create pull request with bundled wheelhouses
    needs:
      - build-linux-wheelhouse
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Download linux x86_64 wheelhouse
        uses: actions/download-artifact@v4
        with:
          name: pyperformance-wheelhouse-linux-x86_64
          path: benchmarks/pyperformance/wheelhouse-linux-x86_64

      - name: Download linux arm64 wheelhouse
        uses: actions/download-artifact@v4
        with:
          name: pyperformance-wheelhouse-linux-arm64
          path: benchmarks/pyperformance/wheelhouse-linux-arm64

      - name: Stage bundled wheelhouses
        run: |
          git add -A benchmarks/pyperformance/wheelhouse-linux-x86_64 benchmarks/pyperformance/wheelhouse-linux-arm64

      - name: Show Diff
        run: git status

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ inputs.pr_branch }}
          base: ${{ inputs.base_branch }}
          delete-branch: true
          commit-message: "Bundle pyperformance Linux wheelhouses"
          title: "Bundle pyperformance Linux wheelhouses"
          body: |
            This PR was generated by the `bundle-pyperformance` workflow.

            It includes prebuilt PyPerformance wheelhouses for:
            - `wheelhouse-linux-x86_64`
            - `wheelhouse-linux-arm64`

            Generated by running `benchmarks/pyperformance/build_wheelhouse.sh` on both Linux architectures.
          add-paths: |
            benchmarks/pyperformance/wheelhouse-linux-x86_64
            benchmarks/pyperformance/wheelhouse-linux-arm64
