name: Bundle PyPerformance Environments

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: Base branch for the PR
        required: false
        default: main
      pr_branch:
        description: Branch name used for the generated PR
        required: false
        default: automation/bundle-pyperformance

permissions:
  contents: write
  pull-requests: write

jobs:
  build-linux-venv:
    name: Build ${{ matrix.venv_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            venv_name: venv-linux-x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            venv_name: venv-linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build bundled pyperformance environment
        run: |
          set -euo pipefail
          bash benchmarks/pyperformance/build-venv.sh
          test -d "benchmarks/pyperformance/${{ matrix.venv_name }}"

      - name: Upload bundled environment artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyperformance-${{ matrix.venv_name }}
          path: benchmarks/pyperformance/${{ matrix.venv_name }}
          if-no-files-found: error

  create-pr:
    name: Create pull request with bundled environments
    needs:
      - build-linux-venv
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Download linux x86_64 environment
        uses: actions/download-artifact@v4
        with:
          name: pyperformance-venv-linux-x86_64
          path: benchmarks/pyperformance/venv-linux-x86_64

      - name: Download linux arm64 environment
        uses: actions/download-artifact@v4
        with:
          name: pyperformance-venv-linux-arm64
          path: benchmarks/pyperformance/venv-linux-arm64

      - name: Stage bundled environments
        run: |
          git add -A benchmarks/pyperformance/venv-linux-x86_64 benchmarks/pyperformance/venv-linux-arm64

      - name: Show Diff
        run: git status

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ inputs.pr_branch }}
          base: ${{ inputs.base_branch }}
          delete-branch: true
          commit-message: "Bundle pyperformance Linux virtual environments"
          title: "Bundle pyperformance Linux virtual environments"
          body: |
            This PR was generated by the `bundle-pyperformance` workflow.

            It includes prebuilt PyPerformance virtual environments for:
            - `venv-linux-x86_64`
            - `venv-linux-arm64`

            Generated by running `benchmarks/pyperformance/build-venv.sh` on both Linux architectures.
          add-paths: |
            benchmarks/pyperformance/venv-linux-x86_64
            benchmarks/pyperformance/venv-linux-arm64
